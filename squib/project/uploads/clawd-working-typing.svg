      <rect x="3.2" y="1.3" width="0.9" height="0.7"></rect>
      <rect x="4.4" y="1.3" width="0.9" height="0.7"></rect>
      <rect x="5.6" y="1.3" width="0.9" height="0.7"></rect>
      <rect x="6.8" y="1.3" width="0.9" height="0.7"></rect>
      <rect x="8.0" y="1.3" width="0.9" height="0.7"></rect>
