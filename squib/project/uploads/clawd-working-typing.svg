      <rect x="6.5" y="2.2" width="0.9" height="0.7"></rect>
      <rect x="7.7" y="2.2" width="0.9" height="0.7"></rect>
      <rect x="8.9" y="2.2" width="0.9" height="0.7"></rect>
      <rect x="10.1" y="2.2" width="0.9" height="0.7"></rect>
      <rect x="11.3" y="2.2" width="0.9" height="0.7"></rect>
      <rect x="12.5" y="2.2" width="0.9" height="0.7"></rect>
      <rect x="13.7" y="2.2" width="0.9" height="0.7"></rect>
      <rect x="14.9" y="2.2" width="0.6" height="0.7"></rect>
    </g>
    
    <g fill="#B0BEC5">
