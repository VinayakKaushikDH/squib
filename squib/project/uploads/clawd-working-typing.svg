      <rect class="key-flash kf2" x="9.2" y="1.3" width="0.9" height="0.7"></rect>
      <rect class="key-flash kf3" x="2.9" y="2.2" width="0.9" height="0.7"></rect>
      <rect class="key-flash kf4" x="7.7" y="2.2" width="0.9" height="0.7"></rect>
