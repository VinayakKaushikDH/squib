<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    
    <g id="pixel-packet">
      <rect x="0" y="0" width="1.5" height="1.5"></rect>
    </g>
  </defs>

  
  <rect class="shadow-anim" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"></rect>

  
  <g fill="#40C4FF">
    <use href="#pixel-packet" class="data-bit d1" x="3" y="7"></use>
    <use href="#pixel-packet" class="data-bit d2" x="7" y="8"></use>
    <use href="#pixel-packet" class="data-bit d3" x="11" y="7"></use>
    <use href="#pixel-packet" class="data-bit d4" x="5" y="8"></use>
  </g>

  
  <g id="screen" transform="translate(1.25, 0)">
    <rect x="-0.5" y="-6" width="13.5" height="10.5" fill="#1E1E2E" rx="0.3"></rect>
    <rect x="-0.5" y="-6" width="13.5" height="1.2" fill="#2D2D3D" rx="0.3"></rect>
    <rect x="0.3" y="-5.6" width="0.5" height="0.4" fill="#FF5F56"></rect>
    <rect x="1.2" y="-5.6" width="0.5" height="0.4" fill="#FFBD2E"></rect>
    <rect x="2.1" y="-5.6" width="0.5" height="0.4" fill="#27C93F"></rect>

    
    <rect class="code-line cl1" x="0.5" y="-3.5" width="5" height="0.7" fill="#4CAF50" opacity="0.8"></rect>
    <rect class="code-line cl2" x="2" y="-1.8" width="8" height="0.7" fill="#4CAF50" opacity="0.8"></rect>
    <rect class="code-line cl3" x="2" y="-0.1" width="4.5" height="0.7" fill="#40C4FF" opacity="0.7"></rect>
    <rect class="code-line cl4" x="0.5" y="1.6" width="2" height="0.7" fill="#FFC107" opacity="0.7"></rect>

  </g>

  
  <g class="body-bounce">
    <g class="breathe">
      <g fill="#DE886D">
        <rect x="3" y="13" width="1" height="2"></rect>
        <rect x="5" y="13" width="1" height="2"></rect>
        <rect x="9" y="13" width="1" height="2"></rect>
        <rect x="11" y="13" width="1" height="2"></rect>
        <rect x="2" y="6" width="11" height="7"></rect>
