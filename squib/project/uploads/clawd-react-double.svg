<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    
  </defs>

  
  <rect x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"></rect>

  
  <g fill="#DE886D">
    <rect x="3" y="11" width="1" height="4"></rect>
    <rect x="5" y="11" width="1" height="4"></rect>
    <rect x="9" y="11" width="1" height="4"></rect>
    <rect x="11" y="11" width="1" height="4"></rect>
  </g>

  
  <g class="body-react">
