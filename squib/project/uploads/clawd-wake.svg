<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
  <defs>
    
  </defs>

  <rect class="once shadow" x="-1" y="15" width="17" height="1" fill="#000000" opacity="0.4"></rect>

  <g class="once body-motion">
    <g fill="#DE886D">
      <g class="once leg-shift">
        <rect class="once scale-top-left leg-grow" x="3" y="11" width="1" height="4"></rect>
      </g>
      <g class="once leg-shift">
        <rect class="once scale-top-left leg-grow" x="5" y="11" width="1" height="4"></rect>
      </g>
      <g class="once leg-shift">
        <rect class="once scale-top-left leg-grow" x="9" y="11" width="1" height="4"></rect>
      </g>
      <g class="once leg-shift">
        <rect class="once scale-top-left leg-grow" x="11" y="11" width="1" height="4"></rect>
      </g>
    </g>

    <g class="once torso-shift">
      <rect class="once scale-top-left torso-shape" x="2" y="6" width="11" height="7" fill="#DE886D"></rect>
    </g>

    <g class="once arm-left">
      <rect x="0" y="9" width="2" height="2" fill="#DE886D"></rect>
    </g>

    <g class="once arm-right">
      <rect x="13" y="9" width="2" height="2" fill="#DE886D"></rect>
    </g>

    <g fill="#000000">
      <g class="once eye-shift">
        <rect class="once scale-top-left eye-shape" x="4" y="8" width="1" height="2"></rect>
      </g>
      <g class="once eye-shift">
        <rect class="once scale-top-left eye-shape" x="10" y="8" width="1" height="2"></rect>
      </g>
    </g>
  </g>
</svg>