<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    

    <g id="pixel-question">
      <rect x="1" y="0" width="2" height="1"></rect>
      <rect x="0" y="1" width="1" height="1"></rect>
      <rect x="3" y="1" width="1" height="2"></rect>
      <rect x="2" y="3" width="1" height="1"></rect>
      <rect x="1" y="4" width="1" height="1"></rect>
      <rect x="1" y="6" width="1" height="1"></rect>
    </g>
  </defs>

  
  <rect x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"></rect>

  
  <g fill="#DE886D">
    <rect x="3" y="13" width="1" height="2"></rect>
    <rect x="5" y="13" width="1" height="2"></rect>
    <rect x="9" y="13" width="1" height="2"></rect>
    <rect x="11" y="13" width="1" height="2"></rect>
  </g>

  
  <g class="body-react">
    <g fill="#DE886D">
      <rect x="2" y="6" width="11" height="7"></rect>
      
      <g class="arm-l-react">
        <rect x="0" y="9" width="2" height="2"></rect>
      </g>
      <rect x="13" y="9" width="2" height="2"></rect>
    </g>
    <g class="eyes-react">
      <g class="eyes-blink" fill="#000000">
        <rect x="4" y="8" width="1" height="2"></rect>
        <rect x="10" y="8" width="1" height="2"></rect>
      </g>
    </g>
  </g>

  
  <g class="question-pop" fill="#40C4FF">
    <use href="#pixel-question"></use>
  </g>
</svg>