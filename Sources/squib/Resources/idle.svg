  <circle id="rp" cx="63.5" cy="45.5" r="3.5" fill="#1a1a2e"/>
  <!-- Eye shine -->
  <circle cx="41" cy="43.5" r="1.2" fill="white"/>
  <circle cx="65" cy="43.5" r="1.2" fill="white"/>

  <!-- Smile -->
  <path d="M 40 65 Q 50 74 60 65" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Tentacles (4, gently curled) -->
