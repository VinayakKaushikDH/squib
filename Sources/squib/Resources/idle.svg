<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" width="200" height="260">
  <!-- Body -->
  <ellipse cx="50" cy="52" rx="36" ry="40" fill="#6B73FF"/>

  <!-- Eyes -->
  <circle cx="38" cy="44" r="7" fill="white"/>
  <circle cx="62" cy="44" r="7" fill="white"/>
  <!-- Pupils (slightly down-center = relaxed idle look) -->
