  <path d="M 38 90 Q 33 107 39 103 Q 34 120 42 118" stroke="#5560DD" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M 62 90 Q 67 107 61 103 Q 66 120 58 118" stroke="#5560DD" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M 76 82 Q 83 97 76 93 Q 82 110 74 108" stroke="#5560DD" stroke-width="9" fill="none" stroke-linecap="round"/>
</svg>
