<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" width="200" height="260">
  <!-- Body: same base purple, excited posture -->
  <ellipse cx="50" cy="52" rx="36" ry="40" fill="#6B73FF"/>

  <!-- Eyes: wide open, excited -->
  <circle cx="38" cy="43" r="8" fill="white"/>
  <circle cx="62" cy="43" r="8" fill="white"/>
  <!-- Big pupils -->
  <circle id="lp" cx="39" cy="44" r="4" fill="#1a1a2e"/>
  <circle id="rp" cx="63" cy="44" r="4" fill="#1a1a2e"/>
  <!-- Eye shine -->
  <circle cx="40.5" cy="42" r="1.5" fill="white"/>
  <circle cx="64.5" cy="42" r="1.5" fill="white"/>

  <!-- Wide open smile -->
  <path d="M 38 64 Q 50 76 62 64" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Exclamation mark above head -->
  <rect x="48" y="4" width="4" height="12" rx="2" fill="#FFD700" opacity="0.95"/>
  <circle cx="50" cy="20" r="2.5" fill="#FFD700" opacity="0.95"/>

  <!-- Sparkles -->
  <path d="M 18 22 L 21 16 L 24 22 L 18 22" fill="#FFD700" opacity="0.7"/>
  <path d="M 76 16 L 79 10 L 82 16 L 76 16" fill="#FFD700" opacity="0.7"/>

  <!-- Tentacles: bouncy / energetic -->
  <path d="M 22 80 Q 14 94 22 90 Q 15 107 23 105" stroke="#5560DD" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M 37 88 Q 32 104 38 100 Q 33 117 41 115" stroke="#5560DD" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M 63 88 Q 68 104 62 100 Q 67 117 59 115" stroke="#5560DD" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M 78 80 Q 86 94 78 90 Q 85 107 77 105" stroke="#5560DD" stroke-width="9" fill="none" stroke-linecap="round"/>
</svg>
