<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" width="200" height="260">
  <!-- Body: darker, tired -->
  <ellipse cx="50" cy="54" rx="36" ry="38" fill="#3D3D8F"/>

  <!-- Closed eyes (arcs) -->
  <path d="M 31 44 Q 38 51 45 44" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 55 44 Q 62 51 69 44" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Relaxed slightly-open mouth -->
  <path d="M 43 67 Q 50 71 57 67" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- ZZZ floating up and right -->
  <text x="66" y="29" font-family="Arial, sans-serif" font-size="8"  font-weight="bold" fill="#7070BB" opacity="0.85">Z</text>
  <text x="73" y="20" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#7070BB" opacity="0.65">Z</text>
  <text x="81" y="10" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#7070BB" opacity="0.45">Z</text>

  <!-- Tentacles: still, drooping -->
  <path d="M 24 84 Q 20 100 26 97 Q 21 113 28 111" stroke="#2D2D6F" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M 38 91 Q 35 108 40 105 Q 36 121 43 119" stroke="#2D2D6F" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M 62 91 Q 65 108 60 105 Q 64 121 57 119" stroke="#2D2D6F" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M 76 84 Q 80 100 74 97 Q 79 113 72 111" stroke="#2D2D6F" stroke-width="9" fill="none" stroke-linecap="round"/>
</svg>
