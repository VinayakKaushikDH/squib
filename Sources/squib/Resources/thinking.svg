<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" width="200" height="260">
  <!-- Body -->
  <ellipse cx="50" cy="52" rx="36" ry="40" fill="#6068F0"/>

  <!-- Eyes -->
  <circle cx="38" cy="44" r="7" fill="white"/>
  <circle cx="62" cy="44" r="7" fill="white"/>
  <!-- Pupils shifted up (looking up = thinking) -->
  <circle id="lp" cx="38" cy="41" r="3.5" fill="#1a1a2e"/>
  <circle id="rp" cx="62" cy="41" r="3.5" fill="#1a1a2e"/>
  <circle cx="39.5" cy="39.5" r="1.2" fill="white"/>
  <circle cx="63.5" cy="39.5" r="1.2" fill="white"/>

  <!-- Neutral / thinking mouth -->
  <line x1="42" y1="65" x2="58" y2="65" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Thought bubble dots -->
  <circle cx="70" cy="28" r="2"   fill="#9BA4FF" opacity="0.9"/>
  <circle cx="76" cy="20" r="3"   fill="#9BA4FF" opacity="0.7"/>
  <circle cx="84" cy="11" r="4.5" fill="#9BA4FF" opacity="0.5"/>

  <!-- Tentacles: raised on the left, three hanging down -->
  <!-- Raised: starts at body's left edge, curves hard left then up -->
  <path d="M 24 82 Q 6 68 6 48 Q 6 30 20 18" stroke="#4A53CC" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- Three down -->
  <path d="M 38 90 Q 33 107 39 103 Q 34 120 42 118" stroke="#4A53CC" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M 62 90 Q 67 107 61 103 Q 66 120 58 118" stroke="#4A53CC" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M 76 82 Q 83 97 76 93 Q 82 110 74 108" stroke="#4A53CC" stroke-width="9" fill="none" stroke-linecap="round"/>
</svg>
