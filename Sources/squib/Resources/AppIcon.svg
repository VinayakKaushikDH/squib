<svg xmlns="http://www.w3.org/2000/svg" viewBox="-2.5 0.5 20 20" width="1024" height="1024" shape-rendering="crispEdges">
  <!-- warm cream background fills the full canvas -->
  <rect x="-2.5" y="0.5" width="20" height="20" fill="#FBF0E6"/>
  <!-- ground shadow -->
  <rect x="3" y="15" width="9" height="1" fill="#000000" opacity="0.2"/>
  <!-- four legs -->
  <rect x="3" y="11" width="1" height="4" fill="#DE886D"/>
  <rect x="5" y="11" width="1" height="4" fill="#DE886D"/>
  <rect x="9" y="11" width="1" height="4" fill="#DE886D"/>
  <rect x="11" y="11" width="1" height="4" fill="#DE886D"/>
  <!-- torso / head block (exact geometry from idle-follow.svg) -->
  <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>
  <!-- left arm -->
  <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>
  <!-- right arm -->
  <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
  <!-- eyes -->
  <rect x="4" y="8" width="1" height="2" fill="#000000"/>
  <rect x="10" y="8" width="1" height="2" fill="#000000"/>
</svg>
